# =============================================================================
# dnsmasq config for SecureGit internal DNS
# Place at: /etc/dnsmasq.d/securegit.conf
# =============================================================================

# Resolve securegit.local to the server's LAN IP
# Replace 192.168.1.100 with your actual server IP
address=/securegit.local/192.168.1.100

# Internal domain
domain=local

# Don't forward .local queries to upstream DNS
local=/local/

# Interface to listen on (LAN interface)
# interface=eth0

# Upstream DNS servers (for non-local queries)
server=1.1.1.1
server=8.8.8.8

# Cache size
cache-size=1000

# Log queries for debugging (disable in production)
# log-queries
