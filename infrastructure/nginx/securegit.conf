server {
    listen 443 ssl;
    server_name securegit.local;

    ssl_certificate     /etc/ssl/securegit/fullchain.pem;
    ssl_certificate_key /etc/ssl/securegit/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # React frontend (production build)
    location / {
        root /var/www/securegit/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Flask API backend
    location /api/ {
        proxy_pass          http://127.0.0.1:5000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_buffering     off;  # Required for SSE streaming (audit log)
    }

    # Health endpoint (unauthenticated)
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # Block internal hook endpoint — only reachable from localhost
    location /internal/ {
        deny all;
        return 403;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/securegit/dist;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';"
        always;

    client_max_body_size 100M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

server {
    listen 80;
    server_name securegit.local;
    return 301 https://$host$request_uri;
}
